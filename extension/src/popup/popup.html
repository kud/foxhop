<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">Fox Hop</h1>
      <a
        class="info"
        href="https://github.com/kud/foxhop"
        target="_blank"
        rel="noopener"
        title="About Fox Hop"
        aria-label="About Fox Hop"
        >&#9432;</a
      >
    </header>

    <button class="action" id="add-current" type="button">
      <span class="action-label">Add current tab&hellip;</span>
      <span class="chevron" aria-hidden="true">&rsaquo;</span>
    </button>

    <div class="section">
      <span class="section-title">Targets</span>
    </div>

    <div class="search">
      <input
        id="search"
        type="search"
        placeholder="Search targets"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <ul class="list" id="list"></ul>
    <p class="state" id="state" hidden></p>

    <script src="popup.js"></script>
  </body>
</html>
