name: Release

on:
  push:
    tags:
      - "cli-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm install -g npm@latest
      # Drop the macOS-generated lockfile so npm resolves rollup's Linux-only
      # optional dep fresh on the runner (npm/cli#4828).
      - run: rm -f package-lock.json && npm install
      - run: npm run build -w cli
      - run: npm publish -w cli --access public
