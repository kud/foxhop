name: Release

on:
  push:
    tags:
      - "cli-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm install -g npm@latest
      - run: npm ci
        working-directory: cli
      - run: npm run build
        working-directory: cli
      - run: npm publish --access public
        working-directory: cli
