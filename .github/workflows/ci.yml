name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Drop the macOS-generated lockfile so npm resolves rollup's Linux-only
      # optional dep fresh on the runner (npm/cli#4828).
      - run: rm -f package-lock.json && npm install
      - run: npm run build -w cli
      - run: npm run typecheck -w cli
      - run: npm run test -w cli

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint -w webextension
